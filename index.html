function pnl(t){if(t.pnlOverride!==undefined&&t.pnlOverride!==null)return t.pnlOverride;if(!t.exit)return null;return(t.exit-t.entry)*t.qty*(t.side==='Long'?1:-1)-(t.fees||0);}
function pct(t){const p=pnl(t);return p===null?null:(p/(t.entry*t.qty))*100;}
function fd(n){if(n===null||n===undefined)return'ÔÇô';const a=Math.abs(n),s=n<0?'-':'';return s+'$'+a.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fp(n){if(n===null||n===undefined)return'ÔÇô';return(n>=0?'+':'')+n.toFixed(2)+'%';}
function pc(n){return n===null?C.muted:n>=0?C.green:C.red;}
function calcRMul(t){if(!t.stopLoss||!t.entry||!t.exit)return null;const risk=Math.abs(t.entry-t.stopLoss)*t.qty;if(risk<=0)return null;return(pnl(t)||0)/risk;}
function calcMaxDD(trades){
  const s=[...trades].filter(t=>t.exit).sort((a,b)=>a.date.localeCompare(b.date));
  let peak=0,eq=0,maxAbs=0,maxPct=0;
  s.forEach(t=>{
    eq+=pnl(t)||0;
    if(eq>peak)peak=eq;
    const dd=peak-eq;
    if(dd>maxAbs){maxAbs=dd;maxPct=peak>0?dd/peak*100:maxAbs>0?100:0;}
  });
  return{abs:maxAbs,pct:maxPct};
}
function calcExpectancy(trades){const ps=trades.filter(t=>t.exit).map(pnl).filter(p=>p!==null);return ps.length?ps.reduce((a,b)=>a+b,0)/ps.length:0;}
function calcDayWinPct(trades){const m={};trades.filter(t=>t.exit).forEach(t=>{m[t.date]=(m[t.date]||0)+(pnl(t)||0);});const d=Object.values(m);return d.length?d.filter(p=>p>0).length/d.length*100:0;}
function calcStreak(trades){
  const s=[...trades].filter(t=>t.exit).sort((a,b)=>a.date.localeCompare(b.date));
  let ts=0,tdir=0;
  for(let i=s.length-1;i>=0;i--){const p=pnl(s[i])||0,d=p>0?1:p<0?-1:0;if(i===s.length-1){ts=d;tdir=d;}else if(d===0||d!==tdir)break;else ts+=tdir;}
  const m={};s.forEach(t=>{m[t.date]=(m[t.date]||0)+(pnl(t)||0);});
  const days=Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0]));
  let ds=0,ddir=0;
  for(let i=days.length-1;i>=0;i--){const p=days[i][1],d=p>0?1:p<0?-1:0;if(i===days.length-1){ds=d;ddir=d;}else if(d===0||d!==ddir)break;else ds+=ddir;}
  return{trade:ts,day:ds};
}
function calcSharpe(trades){
  const ps=trades.filter(t=>t.exit).map(pnl).filter(p=>p!==null);
  if(ps.length<3)return null;
  const mean=ps.reduce((a,b)=>a+b,0)/ps.length;
  const std=Math.sqrt(ps.reduce((a,b)=>a+(b-mean)**2,0)/ps.length);
  return std>0?+(mean/std).toFixed(2):null;
}
function calcConsecWL(trades){
  const s=[...trades].filter(t=>t.exit).sort((a,b)=>a.date.localeCompare(b.date));
  let maxW=0,maxL=0,curW=0,curL=0;
  s.forEach(t=>{const p=pnl(t)||0;if(p>0){curW++;curL=0;maxW=Math.max(maxW,curW);}else if(p<0){curL++;curW=0;maxL=Math.max(maxL,curL);}else{curW=0;curL=0;}});
  return{wins:maxW,losses:maxL};
}
function calcAvgRMul(trades){
  const rs=trades.filter(t=>t.exit).map(calcRMul).filter(r=>r!==null&&isFinite(r));
  return rs.length?+(rs.reduce((a,b)=>a+b,0)/rs.length).toFixed(2):null;
}
function calcTilt(trades){
  const s=[...trades].filter(t=>t.exit).sort((a,b)=>a.date.localeCompare(b.date));
  if(s.length<2)return 0;let tilt=0;
  for(let i=1;i<s.length;i++){if((pnl(s[i-1])||0)<0&&s[i].qty>s[i-1].qty*1.4)tilt++;}
  return Math.min(100,tilt/Math.max(s.length*0.08,0.5)*100);
}

// SVG Charts
function AreaChart({data,xKey,yKey,color,h=150}){
  if(!data||!data.length)return html`<div style=${{height:h,display:'flex',alignItems:'center',justifyContent:'center',color:C.muted,fontSize:12}}>Keine Daten</div>`;
  const W=600,PL=44,PR=8,PT=8,PB=28,iW=W-PL-PR,iH=h-PT-PB;
  const vals=data.map(d=>d[yKey]);const mn=Math.min(...vals),mx=Math.max(...vals);const rng=mx-mn||1;
  const px=i=>PL+i/(data.length-1||1)*iW,py=v=>PT+iH-(v-mn)/rng*iH;
  const pts=data.map((d,i)=>`${px(i)},${py(d[yKey])}`).join(' ');
  const area=`M${PL},${PT+iH} ${data.map((d,i)=>`L${px(i)},${py(d[yKey])}`).join(' ')} L${PL+iW},${PT+iH} Z`;
  const gId='g'+color.replace('#','').slice(0,6);
  const step=Math.max(1,Math.floor(data.length/5));
  return html`<svg viewBox="0 0 ${W} ${h}" style=${{width:'100%',height:h}}>
    <defs><linearGradient id=${gId} x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color=${color} stop-opacity="0.3"/>
      <stop offset="100%" stop-color=${color} stop-opacity="0"/>
    </linearGradient></defs>
    ${[0,0.25,0.5,0.75,1].map((f,i)=>{const v=mn+rng*f;return html`<line key=${i} x1=${PL} y1=${py(v)} x2=${W-PR} y2=${py(v)} stroke=${C.border} stroke-dasharray="4,3"/>
      <text key=${'t'+i} x=${PL-4} y=${py(v)+4} text-anchor="end" font-size="9" fill=${C.muted}>${v>=1000?'$'+(v/1000).toFixed(1)+'k':v<=-1000?'-$'+(Math.abs(v)/1000).toFixed(1)+'k':v<0?'-$'+Math.abs(v).toFixed(0):'$'+v.toFixed(0)}</text>`;
    })}
    ${data.filter((_,i)=>i%step===0).map(d=>html`<text key=${d[xKey]} x=${px(data.indexOf(d))} y=${h-4} text-anchor="middle" font-size="9" fill=${C.muted}>${d[xKey]}</text>`)}
    <path d=${area} fill=${'url(#'+gId+')'}/>
    <polyline points=${pts} fill="none" stroke=${color} stroke-width="2.5" stroke-linejoin="round"/>
  </svg>`;
}
function BarChart({data,xKey,yKey,h=150}){
  if(!data||!data.length)return null;
  const W=600,PL=44,PR=8,PT=8,PB=28,iW=W-PL-PR,iH=h-PT-PB;
  const mx=Math.max(...data.map(d=>Math.abs(d[yKey])),1);
  const bW=iW/data.length*0.6,mid=PT+iH/2;
  return html`<svg viewBox="0 0 ${W} ${h}" style=${{width:'100%',height:h}}>
    ${[-mx,-mx/2,0,mx/2,mx].map((v,i)=>{const y=mid-v/mx*(iH/2);return html`
      <line key=${i} x1=${PL} y1=${y} x2=${W-PR} y2=${y} stroke=${C.border} stroke-dasharray="4,3"/>
      <text key=${'t'+i} x=${PL-4} y=${y+4} text-anchor="end" font-size="9" fill=${C.muted}>${v===0?'0':v>=1000?'$'+(v/1000).toFixed(0)+'k':v<0?'-$'+Math.abs(v).toFixed(0):'$'+v.toFixed(0)}</text>`;
    })}
    <line x1=${PL} y1=${mid} x2=${W-PR} y2=${mid} stroke=${C.border2}/>
    ${data.map((d,i)=>{const v=d[yKey],x=PL+i*(iW/data.length)+(iW/data.length-bW)/2,bh=Math.abs(v)/mx*(iH/2),y=v>=0?mid-bh:mid;return html`
      <rect key=${i} x=${x} y=${y} width=${bW} height=${bh} fill=${v>=0?C.green:C.red} rx="3"/>
      <text key=${'l'+i} x=${x+bW/2} y=${h-4} text-anchor="middle" font-size="9" fill=${C.muted}>${d[xKey]}</text>`;
    })}
  </svg>`;
}
function HBarChart({data,xKey,yKey}){
  if(!data||!data.length)return null;
  const RH=34,W=500,PL=58,PR=80,PT=5,H=data.length*RH+PT+10;
  const mx=Math.max(...data.map(d=>Math.abs(d[yKey])),1);
  const iW=W-PL-PR,midX=PL+iW/2,bH=18;
  return html`<svg viewBox="0 0 ${W} ${H}" style=${{width:'100%',height:H}}>
    <line x1=${midX} y1=${PT} x2=${midX} y2=${H-10} stroke=${C.border2}/>
    ${data.map((d,i)=>{const v=d[yKey],y=PT+i*RH+(RH-bH)/2,w=Math.abs(v)/mx*(iW/2),x=v>=0?midX:midX-w,col=v>=0?C.green:C.red;return html`
      <text key=${'l'+i} x=${PL-4} y=${y+bH/2+4} text-anchor="end" font-size="11" fill=${C.text} font-family="monospace" font-weight="700">${d[xKey]}</text>

    })}
  </svg>`;
}

// ÔöÇÔöÇ Donut Chart ÔöÇÔöÇ
function DonutChart({segments,size=160,thick=26,label,sub}){
  if(!segments||!segments.length)return null;
  const total=segments.reduce((s,g)=>s+Math.abs(g.value),0);
  if(!total)return null;
  const r=(size-thick)/2,cx=size/2,cy=size/2,circ=2*Math.PI*r;
  let off=0;
  const slices=segments.map(g=>{
    const pct=Math.abs(g.value)/total;
    const dash=pct*circ,gap=circ-dash;
    const slice={...g,dash,gap,off};
    off+=dash;
    return slice;
  });
  return html`<div style=${{position:'relative',width:size,height:size,margin:'0 auto'}}>
    <svg viewBox="0 0 ${size} ${size}" style=${{width:size,height:size,transform:'rotate(-90deg)'}}>
      ${slices.map((s,i)=>html`<circle key=${i} cx=${cx} cy=${cy} r=${r}
        fill="none" stroke=${s.color} stroke-width=${thick}
        stroke-dasharray="${s.dash} ${s.gap}"
        stroke-dashoffset=${-s.off}
        stroke-linecap="butt"/>`)}
    </svg>
    <div style=${{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
      ${label?html`<div style=${{fontSize:18,fontWeight:800,color:C.text,lineHeight:1}}>${label}</div>`:''}
      ${sub?html`<div style=${{fontSize:10,color:C.muted,marginTop:2,fontWeight:600}}>${sub}</div>`:''}
    </div>
  </div>`;
}

// ÔöÇÔöÇ Scatter Plot ÔöÇÔöÇ
function ScatterPlot({data,h=160}){
  if(!data||data.length<2)return null;
  const W=500,PL=36,PR=10,PT=10,PB=24;
  const iW=W-PL-PR,iH=h-PT-PB;
  const xs=data.map(d=>d.x),ys=data.map(d=>d.y);
  const minX=Math.min(...xs),maxX=Math.max(...xs)||1;
  const minY=Math.min(...ys),maxY=Math.max(...ys)||1;
  const sx=v=>PL+(v-minX)/(maxX-minX||1)*iW;
  const sy=v=>PT+iH-(v-minY)/(maxY-minY||1)*iH;
  return html`<svg viewBox="0 0 ${W} ${h}" style=${{width:'100%',height:h}}>
    <line x1=${PL} y1=${PT} x2=${PL} y2=${PT+iH} stroke=${C.border2} stroke-width="1"/>
    <line x1=${PL} y1=${PT+iH} x2=${W-PR} y2=${PT+iH} stroke=${C.border2} stroke-width="1"/>
    ${minY<0&&maxY>0?html`<line x1=${PL} y1=${sy(0)} x2=${W-PR} y2=${sy(0)} stroke=${C.border2} stroke-width="1" stroke-dasharray="4 3"/>`:''}
    ${data.map((d,i)=>html`<circle key=${i} cx=${sx(d.x)} cy=${sy(d.y)} r="5"
      fill=${d.y>=0?C.green:C.red} opacity=".8"/>`)}
    <text x=${PL-4} y=${sy(maxY)+4} text-anchor="end" font-size="9" fill=${C.muted}>${maxY.toFixed(1)}</text>
    <text x=${PL-4} y=${sy(minY)+4} text-anchor="end" font-size="9" fill=${C.muted}>${minY.toFixed(1)}</text>
    <text x=${PL} y=${h-2} font-size="9" fill=${C.muted}>R-Multiple</text>
  </svg>`;
}

// Compress image to JPEG, max width 1400px
function compressImage(file,maxW=1400,q=0.82){
  return new Promise(resolve=>{
    const img=new Image(),r=new FileReader();
    r.onload=e=>{img.onload=()=>{
      const cv=document.createElement('canvas');
      const ratio=Math.min(1,maxW/img.width);
      cv.width=Math.round(img.width*ratio);cv.height=Math.round(img.height*ratio);
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      resolve(cv.toDataURL('image/jpeg',q));
    };img.src=e.target.result;};
    r.readAsDataURL(file);
  });
}

// ÔöÇÔöÇ Day of Week P&L chart ÔöÇÔöÇ
function DayOfWeekChart({trades}){
  const cl=trades.filter(t=>t.exit);
  const DAYS=['Mo','Di','Mi','Do','Fr','Sa','So'];
  const buckets=DAYS.map(d=>({d,p:0,n:0,w:0}));
  cl.forEach(t=>{
    const dow=(new Date(t.date).getDay()+6)%7; // Mon=0
    const p=pnl(t)||0;
    buckets[dow].p+=p;buckets[dow].n++;if(p>0)buckets[dow].w++;
  });
  const mx=Math.max(...buckets.map(b=>Math.abs(b.p)),1);
  const W=500,H=160,PL=28,PR=8,PT=8,PB=30,iW=W-PL-PR,iH=H-PT-PB;
  const bW=iW/7*0.62,mid=PT+iH/2;
  const gId='dow'+Math.random().toString(36).slice(2,6);
  return html`<svg viewBox="0 0 ${W} ${H}" style=${{width:'100%',height:H}}>
    <defs>
      <linearGradient id=${gId+'g'} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color=${C.green} stop-opacity=".9"/><stop offset="100%" stop-color=${C.green} stop-opacity=".5"/></linearGradient>
      <linearGradient id=${gId+'r'} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color=${C.red} stop-opacity=".5"/><stop offset="100%" stop-color=${C.red} stop-opacity=".9"/></linearGradient>
    </defs>
    <line x1=${PL} y1=${mid} x2=${W-PR} y2=${mid} stroke=${C.border2} stroke-width="1"/>
    ${buckets.map((b,i)=>{
      const x=PL+i*(iW/7)+(iW/7-bW)/2;
      const bh=Math.abs(b.p)/mx*(iH/2);
      const isPos=b.p>=0;
      const y=isPos?mid-bh:mid;
      const wr=b.n?b.w/b.n*100:0;
      return html`<g key=${i}>
        <rect x=${x} y=${y} width=${bW} height=${bh||0} fill=${isPos?`url(#${gId+'g'})`:  `url(#${gId+'r'})`} rx="4"/>
        <text x=${x+bW/2} y=${H-4} text-anchor="middle" font-size="10" fill=${b.n?C.text:C.muted} font-weight=${b.n?'700':'400'}>${b.d}</text>
        ${b.n?html`<text x=${x+bW/2} y=${isPos?y-5:y+bh+12} text-anchor="middle" font-size="8.5" fill=${isPos?C.green:C.red} font-weight="600">${isPos?'+':''}${b.p>=1000?(b.p/1000).toFixed(1)+'k':b.p.toFixed(0)}</text>`:''}
        ${b.n>0?html`<text x=${x+bW/2} y=${H-16} text-anchor="middle" font-size="7.5" fill=${C.muted}>${wr.toFixed(0)}%</text>`:''}
      </g>`;
    })}
  </svg>`;
}

  const rows=Object.entries(map).sort((a,b)=>b[1].p-a[1].p).slice(0,8);

// ÔöÇÔöÇ Drawdown chart ÔöÇÔöÇ
function DrawdownChart({trades,h=120}){
  const sorted=[...trades].filter(t=>t.exit).sort((a,b)=>a.date.localeCompare(b.date));
  if(sorted.length<2) return null;
  let eq=0,peak=0;
  const dd=sorted.map(t=>{eq+=pnl(t)||0;if(eq>peak)peak=eq;return{date:t.date.slice(5),v:peak>0?-(peak-eq)/peak*100:0};});
  const W=600,PL=40,PR=8,PT=4,PB=22,iW=W-PL-PR,iH=h-PT-PB;
  const minV=Math.min(...dd.map(d=>d.v),-0.5);
  const py=v=>PT+iH*(1-v/minV);
  const px=i=>PL+i/(dd.length-1||1)*iW;
  const pts=dd.map((d,i)=>`${px(i)},${py(d.v)}`).join(' ');
  const area=`M${PL},${PT} ${dd.map((d,i)=>`L${px(i)},${py(d.v)}`).join(' ')} L${PL+iW},${PT} Z`;
  const step=Math.max(1,Math.floor(dd.length/5));
  return html`<svg viewBox="0 0 ${W} ${h}" style=${{width:'100%',height:h}}>
    <defs><linearGradient id="ddg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color=${C.red} stop-opacity=".35"/>
      <stop offset="100%" stop-color=${C.red} stop-opacity=".05"/>
    </linearGradient></defs>
    ${[-0,-25,-50,-75,-100].filter(v=>v>=minV).map((v,i)=>html`<g key=${i}>
      <line x1=${PL} y1=${py(v)} x2=${W-PR} y2=${py(v)} stroke=${C.border} stroke-dasharray="4 3" stroke-width=".5"/>
      <text x=${PL-4} y=${py(v)+4} text-anchor="end" font-size="8.5" fill=${C.muted}>${v.toFixed(0)}%</text>
    </g>`)}
    <path d=${area} fill="url(#ddg)"/>
    <polyline points=${pts} fill="none" stroke=${C.red} stroke-width="1.8" stroke-linejoin="round"/>
    ${dd.filter((_,i)=>i%step===0).map((d,i)=>html`<text key=${i} x=${px(dd.indexOf(d))} y=${h-4} text-anchor="middle" font-size="8.5" fill=${C.muted}>${d.date}</text>`)}
  </svg>`;
}

function Dashboard({trades,onEdit,capital,onCapital}){
  const today=new Date().toISOString().slice(0,10);
  const cl=trades.filter(t=>t.exit);

  // ÔöÇÔöÇ Heute ÔöÇÔöÇ
  const todayTrades=trades.filter(t=>t.date===today);
  const todayCl=todayTrades.filter(t=>t.exit);
  const todayPs=todayCl.map(pnl).filter(p=>p!==null);
  const todayPnl=todayPs.reduce((a,b)=>a+b,0);
  const todayW=todayPs.filter(p=>p>0).length;
  const todayL=todayPs.filter(p=>p<0).length;
  const todayWr=todayPs.length?todayW/todayPs.length*100:0;
  const todayOpen=todayTrades.filter(t=>!t.exit).length;
  const todayAvgW=todayW?todayPs.filter(p=>p>0).reduce((a,b)=>a+b,0)/todayW:0;
  const todayAvgL=todayL?Math.abs(todayPs.filter(p=>p<0).reduce((a,b)=>a+b,0)/todayL):0;
  const todayBest=todayPs.length?Math.max(...todayPs):null;
  const todayWorst=todayPs.length?Math.min(...todayPs):null;
  const todaySymbols=[...new Set(todayCl.map(t=>t.symbol))];
  // P&L kumulativ ├╝ber den Tag (nach Zeit sortiert)
  const todaySorted=[...todayCl].sort((a,b)=>(a.time||'').localeCompare(b.time||'')||a.date.localeCompare(b.date));
  let teq=0;const todayEqD=todaySorted.map((t,i)=>({date:t.time||String(i+1),eq:+(teq+=pnl(t)||0).toFixed(2)}));
  const hasTodayData=todayTrades.length>0;

  // ÔöÇÔöÇ Gesamt ÔöÇÔöÇ
  const ps=cl.map(pnl).filter(p=>p!==null);
  const ws=ps.filter(p=>p>0),ls=ps.filter(p=>p<0);
  const tot=ps.reduce((a,b)=>a+b,0);
  const wr=ps.length?ws.length/ps.length*100:0;
  const avgW=ws.length?ws.reduce((a,b)=>a+b,0)/ws.length:0;

              <svg viewBox=${'0 0 '+svgW+' 145'} width="100%" style=${{overflow:'visible'}}>
                ${hist.map((h,i)=>{
                  const bh=Math.max(h.cnt/maxCnt*CH,h.cnt>0?2:0);
                  const x=OX+i*(BW+BPAD);
                  const label=Math.abs(h.lo)<1000?(h.lo>=0?'+'+h.lo.toFixed(0):h.lo.toFixed(0)):(h.lo>=0?'+'+(h.lo/1000).toFixed(1)+'k':(h.lo/1000).toFixed(1)+'k');
                  return html`<g key=${i}>
                    <rect x=${x} y=${OY-bh} width=${BW} height=${bh||0} fill=${h.pos?C.green:C.red} rx="3" opacity=".82"/>
                    <text x=${x+BW/2} y=${OY+12} text-anchor="middle" fill=${C.muted} font-size="7.5">${label}</text>

        </${Card}>

        <!-- Letzte Trades -->
        <${Card}>
          <div style=${{padding:'14px 20px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style=${{fontSize:10,fontWeight:700,color:C.muted,letterSpacing:'.09em'}}>LETZTE TRADES</div>

  if(fTag) rows=rows.filter(t=>Object.values(t.tags||{}).includes(fTag));
  if(fRev==='Yes') rows=rows.filter(t=>t.reviewed);
  if(fRev==='No') rows=rows.filter(t=>!t.reviewed);
  rows.sort((a,b)=>{
    let av=a[sort.k],bv=b[sort.k];
    if(sort.k==='pnl'){av=pnl(a);bv=pnl(b);}
    if(sort.k==='rmul'){av=calcRMul(a);bv=calcRMul(b);}
    if(av===null||av===undefined) av=-Infinity;
    if(bv===null||bv===undefined) bv=-Infinity;
    return av<bv?-sort.d:av>bv?sort.d:0;
  });

  function toggleSort(k){setSort(s=>s.k===k?{k,d:-s.d}:{k,d:-1});}
  function SH({k,children}){const a=sort.k===k;return html`<th key=${k} onClick=${()=>toggleSort(k)} style=${{padding:'9px 14px',textAlign:'left',fontSize:10,fontWeight:700,color:a?C.accent:C.muted,letterSpacing:'.07em',whiteSpace:'nowrap',cursor:'pointer',userSelect:'none'}}>${children}${a?(sort.d>0?' ÔćĹ':' Ôćô'):''}</th>`;}

  const allTagVals=[...new Set(trades.flatMap(t=>Object.values(t.tags||{})).filter(Boolean))];
  const allIds=rows.map(t=>t.id);
  const allChecked=allIds.length>0&&allIds.every(id=>checked.has(id));
  const someChecked=checked.size>0;

  function toggleAll(){
    if(allChecked) setChecked(new Set());
    else setChecked(new Set(allIds));
  }
  function toggleOne(id,e){
    e.stopPropagation();
    setChecked(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});
  }
  function deleteSelected(){
    if(!confirm(`${checked.size} Trade(s) wirklich l├Âschen?`))return;
    setTrades(ts=>ts.filter(t=>!checked.has(t.id)));
    setChecked(new Set());
  }

  return html`<div style=${{display:'flex',flexDirection:'column',gap:16}}>

          ­čŚĹ ${checked.size} l├Âschen
        </button>`:''}
        <button onClick=${()=>onEdit(null)} style=${{background:C.accent,color:'#000',border:'none',borderRadius:8,padding:'8px 18px',fontWeight:700,cursor:'pointer',fontSize:13}}>+ Trade</button>

    </div>

    <${Card} style=${{padding:'12px 16px'}}>
      <div style=${{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}}>
        <input placeholder="SymbolÔÇŽ" value=${fSym} onInput=${e=>setFSym(e.target.value)} style=${{background:'var(--inp-bg)',border:'1px solid var(--inp-border)',borderRadius:7,padding:'7px 11px',color:C.text,fontSize:13,width:110}}/>
        ${['All','Long','Short'].map(s=>html`<button key=${s} onClick=${()=>setFSide(s)} style=${{background:fSide===s?C.accent:'transparent',color:fSide===s?'#000':C.muted,border:`1px solid ${fSide===s?C.accent:C.border}`,borderRadius:7,padding:'7px 14px',fontSize:12,cursor:'pointer',fontWeight:600}}>${s}</button>`)}
        <select value=${fTag} onChange=${e=>setFTag(e.target.value)} style=${{background:'var(--inp-bg)',border:'1px solid var(--inp-border)',borderRadius:7,padding:'7px 11px',color:C.text,fontSize:13}}>
          <option value="">Alle Tags</option>
          ${allTagVals.map(v=>html`<option key=${v} value=${v}>${v}</option>`)}
        </select>
        <select value=${fRev} onChange=${e=>setFRev(e.target.value)} style=${{background:'var(--inp-bg)',border:'1px solid var(--inp-border)',borderRadius:7,padding:'7px 11px',color:C.text,fontSize:13}}>
          ${['All','Yes','No'].map(v=>html`<option key=${v} value=${v}>${v==='All'?'Alle':v==='Yes'?'Reviewed':'Nicht reviewed'}</option>`)}
        </select>
        ${someChecked?html`<span style=${{fontSize:12,color:C.accent,fontWeight:600}}>${checked.size} ausgew├Ąhlt</span>`:''}
      </div>
    </${Card}>

    <${Card} style=${{padding:0}}>
      <div style=${{overflowX:'auto'}}><table style=${{width:'100%',borderCollapse:'collapse',fontSize:13}}>
        <thead><tr style=${{borderBottom:`1px solid ${C.border}`}}>
          <th style=${{padding:'9px 10px 9px 14px',width:36}}>

          <${SH} k="type">Asset</${SH}>
          <${SH} k="entry">Einstieg</${SH}>
          <${SH} k="exit">Ausstieg</${SH}>
          <${SH} k="qty">Menge</${SH}>
          <${SH} k="pnl">P&L $</${SH}>
          <${SH} k="rmul">R-Mul.</${SH}>
          <th style=${{padding:'9px 14px',textAlign:'left',fontSize:10,fontWeight:700,color:C.muted,letterSpacing:'.07em'}}>Tags</th>
          <${SH} k="rating">Rating</${SH}>
          <th style=${{padding:'9px 14px',textAlign:'left',fontSize:10,fontWeight:700,color:C.muted,letterSpacing:'.07em'}}>Rev.</th>
          <th style=${{padding:'9px 14px'}}></th>
        </tr></thead>
        <tbody>${rows.map(t=>{
          const p=pnl(t),rm=calcRMul(t);
          const tagVals=Object.values(t.tags||{}).filter(Boolean);
          const isChecked=checked.has(t.id);
          const isExpanded=expanded===t.id;
          return html`<tr key=${t.id} class="hr"
            style=${{borderBottom:`1px solid ${C.border}20`,background:isChecked?C.accent+'11':isExpanded?C.card2:'transparent',cursor:'pointer'}}
            onClick=${()=>setExpanded(isExpanded?null:t.id)}>
            <td style=${{padding:'10px 10px 10px 14px'}} onClick=${e=>toggleOne(t.id,e)}>
              <input type="checkbox" checked=${isChecked} onChange=${()=>{}}
                style=${{accentColor:C.accent,width:15,height:15,cursor:'pointer',pointerEvents:'none'}}/>
            </td>
            <td style=${{padding:'10px 14px',color:C.muted,fontSize:12,whiteSpace:'nowrap'}}>${t.date}${t.time?html` <span style=${{fontSize:10}}>${t.time}</span>`:''}</td>
            <td style=${{padding:'10px 14px',fontFamily:'monospace',fontWeight:700}}>${t.symbol}</td>
            <td style=${{padding:'10px 14px',fontWeight:700,fontSize:12,color:t.side==='Long'?C.green:C.red}}>${t.side==='Long'?'Ôľ▓':'Ôľ╝'} ${t.side}</td>

            <td style=${{padding:'10px 14px',fontFamily:'monospace'}}>$${t.entry.toFixed(2)}</td>
            <td style=${{padding:'10px 14px',fontFamily:'monospace'}}>${t.exit?'$'+t.exit.toFixed(2):html`<${Badge} color=${C.yellow}>Offen</${Badge}>`}</td>
            <td style=${{padding:'10px 14px',fontFamily:'monospace'}}>${t.qty}</td>
            <td style=${{padding:'10px 14px',fontFamily:'monospace',fontWeight:700,color:pc(p)}}>${p===null?'ÔÇô':(p>=0?'+':'')+fd(p)}</td>
            <td style=${{padding:'10px 14px',fontFamily:'monospace',fontSize:12,color:pc(rm)}}>${rm===null?'ÔÇô':(rm>=0?'+':'')+rm.toFixed(2)+'R'}</td>
            <td style=${{padding:'10px 14px'}}>
              <div style=${{display:'flex',gap:4,flexWrap:'wrap'}}>

            <td style=${{padding:'10px 14px'}} onClick=${e=>e.stopPropagation()}>
              <button onClick=${()=>onEdit(t)} style=${{background:'transparent',border:`1px solid ${C.border}`,borderRadius:6,padding:'4px 10px',color:C.muted,fontSize:12,cursor:'pointer'}}>ÔťÄ</button>
            </td>
          </tr>
          ${isExpanded&&(t.notes||t.setup||t.session)?html`<tr key=${'x'+t.id} style=${{borderBottom:`1px solid ${C.border}20`,background:C.card2}}>
            <td colSpan="13" style=${{padding:'10px 18px'}}>
              <div style=${{display:'flex',gap:20,flexWrap:'wrap',fontSize:12}}>

                ${t.session?html`<span><span style=${{color:C.muted}}>Session: </span><span style=${{fontWeight:600}}>${t.session}</span></span>`:''}
                ${t.notes?html`<span style=${{color:C.muted,fontStyle:'italic'}}>${t.notes}</span>`:''}
              </div>
            </td>
          </tr>`:''}`;
        })}</tbody>
      </table></div>
      <div style=${{padding:'10px 18px',fontSize:12,color:C.muted,borderTop:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span>${rows.length} Trades${someChecked?html` ┬Ě <span style=${{color:C.accent,fontWeight:600}}>${checked.size} ausgew├Ąhlt</span>`:''}
        </span>
        ${someChecked?html`<button onClick=${deleteSelected} style=${{background:C.red+'22',border:`1px solid ${C.red}`,borderRadius:7,padding:'5px 14px',color:C.red,cursor:'pointer',fontSize:12,fontWeight:600}}>­čŚĹ ${checked.size} l├Âschen</button>`:''}

// ÔöÇÔöÇÔöÇ REPORTS ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
function Reports({trades,plays}){
  const [tab,setTab]=React.useState('overview');
  const tabs=[{k:'overview',l:'├ťbersicht'},{k:'calendar',l:'Kalender'},{k:'time',l:'Zeit & Tag'},{k:'session',l:'Session'},{k:'strategy',l:'Strategie'},{k:'symbol',l:'Symbol'},{k:'asset',l:'Asset-Typ'},{k:'wl',l:'W/L Vergleich'},{k:'tags',l:'Tags'}];
  const closed=trades.filter(t=>t.exit);

  // ÔöÇÔöÇ Overview sub-view ÔöÇÔöÇ
  function Overview(){
    const wins=closed.filter(t=>pnl(t)>0),losses=closed.filter(t=>pnl(t)<0);
    const avgW=wins.length?wins.reduce((s,t)=>s+pnl(t),0)/wins.length:0;
    const avgL=losses.length?Math.abs(losses.reduce((s,t)=>s+pnl(t),0)/losses.length):0;
    const pf=avgL>0?(wins.reduce((s,t)=>s+pnl(t),0))/Math.abs(losses.reduce((s,t)=>s+pnl(t),0)):null;
    const ex=calcExpectancy(closed);
    const dd=calcMaxDD(closed);
    const sh=calcSharpe(closed);
    const avgRm=calcAvgRMul(closed);
    const conse=calcConsecWL(closed);
    const items=[
      {l:'Trades',v:closed.length},{l:'Gewinner',v:wins.length},{l:'Verlierer',v:losses.length},
      {l:'Win Rate',v:closed.length?(wins.length/closed.length*100).toFixed(1)+'%':'ÔÇô'},
      {l:'Avg. Win',v:avgW?'+'+fd(avgW):'ÔÇô'},{l:'Avg. Loss',v:avgL?'-'+fd(avgL):'ÔÇô'},

  // ÔöÇÔöÇ Calendar sub-view ÔöÇÔöÇ
  function CalView(){
    const [mo,setMo]=React.useState(()=>new Date());
    const yr=mo.getFullYear(),mn=mo.getMonth();
    const days={};
    trades.forEach(t=>{
      const p=pnl(t);
      if(!t.exit||p===null) return;
      const d=t.date;
      if(!days[d]) days[d]={p:0,n:0};
      days[d].p+=p; days[d].n++;
    });
    const first=new Date(yr,mn,1);
    let startDow=first.getDay(); if(startDow===0)startDow=7;
    const totalCells=startDow-1+new Date(yr,mn+1,0).getDate();
    const cells=Array.from({length:Math.ceil(totalCells/7)*7},(_,i)=>{
      const d=i-(startDow-2);
      if(d<1||d>new Date(yr,mn+1,0).getDate()) return null;
      const ds=`${yr}-${String(mn+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      return {d,ds,info:days[ds]||null};
    });
    const fmt=new Intl.DateTimeFormat('de-DE',{month:'long',year:'numeric'});
    return html`<${Card} style=${{padding:18}}>
      <div style=${{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <button onClick=${()=>setMo(new Date(yr,mn-1,1))} style=${{background:'transparent',border:`1px solid ${C.border}`,borderRadius:7,padding:'5px 12px',color:C.text,cursor:'pointer',fontSize:16}}>ÔÇ╣</button>
        <div style=${{fontWeight:700,fontSize:15}}>${fmt.format(mo)}</div>
        <button onClick=${()=>setMo(new Date(yr,mn+1,1))} style=${{background:'transparent',border:`1px solid ${C.border}`,borderRadius:7,padding:'5px 12px',color:C.text,cursor:'pointer',fontSize:16}}>ÔÇ║</button>
      </div>
      <div style=${{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4}}>
        ${['Mo','Di','Mi','Do','Fr','Sa','So'].map(d=>html`<div key=${d} style=${{textAlign:'center',fontSize:10,fontWeight:700,color:C.muted,padding:'4px 0'}}>${d}</div>`)}
        ${cells.map((c,i)=>{
          if(!c) return html`<div key=${'e'+i}></div>`;
          const bg=c.info?(c.info.p>0?C.green+'33':C.red+'33'):C.card2;
          const col=c.info?(c.info.p>0?C.green:C.red):C.muted;
          return html`<div key=${c.ds} style=${{background:bg,borderRadius:7,padding:'6px 4px',textAlign:'center',minHeight:48}}>
            <div style=${{fontSize:11,fontWeight:700,color:c.info?col:C.muted}}>${c.d}</div>
            ${c.info?html`<div style=${{fontSize:10,color:col,fontWeight:600}}>${c.info.p>=0?'+':''}${fd(c.info.p)}</div><div style=${{fontSize:9,color:C.muted}}>${c.info.n}T</div>`:''}
          </div>`;
        })}
      </div>
    </${Card}>`;
  }

  // ÔöÇÔöÇ Time & Day sub-view ÔöÇÔöÇ
  function TimeView(){
    const hours={};

    const dowN={Mo:0,Di:0,Mi:0,Do:0,Fr:0,Sa:0,So:0};

      const dt=new Date(t.date);

// ÔöÇÔöÇÔöÇ PLAYBOOK ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
function Playbook({plays,setPlays}){
  const [sel,setSel]=React.useState(plays.length?plays[0].id:null);
  const [edit,setEdit]=React.useState(false);
  const [form,setForm]=React.useState({});

  const cur=plays.find(p=>p.id===sel)||null;

  function newPlay(){
    const p={id:Date.now(),name:'Neue Strategie',description:'',rules:'',notes:''};
    setPlays(ps=>[...ps,p]);setSel(p.id);setForm(p);setEdit(true);
  }
  function savePlay(){
    setPlays(ps=>ps.map(p=>p.id===sel?{...p,...form}:p));setEdit(false);
  }

function parseCSVLine(line){
  const res=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){res.push(cur);cur='';}
    else{cur+=c;}
  }
  res.push(cur);return res;
}

function detectAssetType(symbol,name){
  const s=symbol.toUpperCase(),n=(name||'').toLowerCase();
  if(['BTC','ETH','LTC','XRP','ADA','SOL','DOGE'].some(c=>s.includes(c)))return'Crypto';
  if(s.includes('/')&&!s.includes('USD'+'T'))return'Forex';
  if(['GOLD','SILVER','OIL','GAS','PLATINUM'].some(c=>n.includes(c.toLowerCase())))return'CFD';
  if(['US100','US500','DE40','UK100','JP225','NDAQ','NAS100'].includes(s))return'CFD';
  return'Stock';
}

function parseFundsHistory(csv,existingIds){
  const lines=csv.trim().split('\n').filter(Boolean);
  const hdr=parseCSVLine(lines[0]).map(h=>h.trim());
  const idx={};hdr.forEach((h,i)=>idx[h]=i);
  if(idx['Amount']===undefined||idx['Instrument Symbol']===undefined)return null;
  const trades=[];const skipped={dup:0,swap:0};
  lines.slice(1).forEach(line=>{
    const v=parseCSVLine(line);
    const get=k=>v[idx[k]]||'';
    if(get('Type')!=='TRADE'){skipped.swap++;return;}
    if(get('Status')!=='PROCESSED')return;
    const amount=parseFloat(get('Amount'));
    if(isNaN(amount))return;
    const brokerTradeId=get('Trade Id');
    const rowId=get('Id')||brokerTradeId;
    if(existingIds&&existingIds.has(rowId)){skipped.dup++;return;}
    const dt=get('Modified');
    const date=dt.slice(0,10);
    const time=dt.length>=16?dt.slice(11,16):'';
    const symbol=(get('Instrument Symbol')||'').toUpperCase().replace('/','');
    const name=get('Instrument Name');
    const type=detectAssetType(get('Instrument Symbol'),name);
    trades.push({
      id:rowId||String(Date.now()+Math.random()),
      brokerTradeId,date,time,symbol,type,
      side:amount>=0?'Long':'Short',
      entry:0,exit:amount,qty:1,fees:0,
      pnlOverride:amount,
      notes:name+(amount===0?' (Keine Preis├Ąnderung)':''),
      setup:'',session:'',rating:0,reviewed:false,tags:{}
    });
  });
  return{trades,skipped};
}

function parseGenericCSV(csv){
  const lines=csv.trim().split('\n').filter(Boolean);
  const hdr=parseCSVLine(lines[0]).map(h=>h.trim().toLowerCase());
  const need=['date','symbol','side','entry','qty'];
  const miss=need.filter(k=>!hdr.includes(k));
  if(miss.length)return{error:'Fehlende Spalten: '+miss.join(', ')};
  const trades=lines.slice(1).map((line,i)=>{
    const vals=parseCSVLine(line);
    const obj={};hdr.forEach((h,j)=>obj[h]=(vals[j]||'').trim());
    return{
      id:String(Date.now()+i+Math.random()),
      date:obj.date,time:obj.time||'',
      symbol:(obj.symbol||'').toUpperCase(),
      type:obj.type||obj.asset||'Stock',
      side:obj.side||'Long',
      entry:parseFloat(obj.entry)||0,
      exit:obj.exit?parseFloat(obj.exit):null,
      qty:parseFloat(obj.qty)||1,
      fees:parseFloat(obj.fees)||0,
      stopLoss:obj.stoploss?parseFloat(obj.stoploss):null,
      profitTarget:obj.profittarget?parseFloat(obj.profittarget):null,
      notes:obj.notes||'',setup:'',session:'',rating:0,reviewed:false,tags:{}
    };
  });
  return{trades};
}

  const [open,setOpen]=React.useState(true);
  const openPos=trades.filter(t=>!t.exit).length;
  const isDark=theme==='dark';
  const nav=[
    {k:'dashboard',icon:'ÔľŽ',label:'Dashboard'},
    {k:'journal',icon:'Ôëí',label:'Journal'},
    {k:'reports',icon:'ÔćŚ',label:'Reports'},
    {k:'playbook',icon:'ÔŚł',label:'Playbook'},
    {k:'notebook',icon:'ÔťÄ',label:'Notebook'},
    {k:'import',icon:'ÔĄĺ',label:'Import'},
  ];
  const sb={background:C.sidebar,borderRight:`1px solid ${C.sidebarBorder}`,display:'flex',flexDirection:'column',height:'100vh',overflowY:'auto',overflowX:'hidden',transition:'width .22s cubic-bezier(.4,0,.2,1)',width:open?220:58,flexShrink:0};
  return html`<div style=${sb}>
    <!-- Logo -->
    <div style=${{padding:'0 12px',height:56,display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:`1px solid ${C.sidebarBorder}`,flexShrink:0}}>
      ${open?html`<div style=${{display:'flex',alignItems:'center',gap:8}}>
        <div style=${{width:26,height:26,borderRadius:7,background:C.accent,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:900,color:'#fff',flexShrink:0}}>T</div>
        <span style=${{fontWeight:800,fontSize:14,color:C.text,letterSpacing:'-.01em'}}>TradeTrack</span>
      </div>`:''}
      <button onClick=${()=>setOpen(o=>!o)} style=${{background:'transparent',border:'none',color:C.muted,cursor:'pointer',padding:6,borderRadius:6,lineHeight:1,fontSize:15,flexShrink:0}} title=${open?'Zuklappen':'Aufklappen'}>${open?'ÔÇ╣':'ÔÇ║'}</button>
    </div>

    <!-- Nav -->
    <div style=${{flex:1,padding:'10px 8px',display:'flex',flexDirection:'column',gap:2}}>
      ${nav.map(n=>{
        const active=page===n.k;
        return html`<button key=${n.k} onClick=${()=>setPage(n.k)} title=${n.label}
          style=${{display:'flex',alignItems:'center',gap:10,
            background:active?C.accent+'1A':'transparent',
            color:active?C.accent:C.muted,
            border:'none',borderRadius:9,
            padding:open?'9px 12px':'9px 0',
            justifyContent:open?'flex-start':'center',
            fontWeight:active?700:500,fontSize:13,
            textAlign:'left',transition:'all .15s',
            whiteSpace:'nowrap',width:'100%'}}>
          <span style=${{fontSize:15,flexShrink:0,width:20,textAlign:'center',fontStyle:'normal'}}>${n.icon}</span>
          ${open?html`<span style=${{flex:1}}>${n.label}</span>`:''}
          ${n.k==='journal'&&openPos>0&&open?html`<span style=${{background:C.accent,color:'#fff',borderRadius:10,padding:'1px 7px',fontSize:10,fontWeight:700,marginLeft:'auto'}}>${openPos}</span>`:''}
          ${active&&!open?html`<span style=${{position:'absolute',left:48,width:3,height:18,background:C.accent,borderRadius:2}}></span>`:''}
        </button>`;
      })}
    </div>

    <!-- Footer: theme toggle + stats -->
    <div style=${{padding:'10px 8px',borderTop:`1px solid ${C.sidebarBorder}`,display:'flex',flexDirection:'column',gap:6,flexShrink:0}}>
      <button onClick=${toggleTheme}
        style=${{display:'flex',alignItems:'center',gap:10,background:'transparent',border:`1px solid ${C.border}`,borderRadius:9,
          padding:open?'8px 12px':'8px 0',justifyContent:open?'flex-start':'center',
          color:C.muted,fontSize:12,fontWeight:600,width:'100%',transition:'all .15s'}}
        title=${isDark?'Hell-Modus':'Dunkel-Modus'}>
        <span style=${{fontSize:14,width:20,textAlign:'center'}}>${isDark?'ÔśÇ':'­čîÖ'}</span>
        ${open?html`<span>${isDark?'Hell-Modus':'Dunkel-Modus'}</span>`:''}
      </button>
      ${open?html`<div style=${{fontSize:10,color:C.muted,padding:'4px 4px 0'}}>${trades.length} Trades ┬Ě ${openPos} offen</div>`:''}
    </div>
  </div>`;
}

// ÔöÇÔöÇÔöÇ TRADE MODAL WRAPPER ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
function ModalWrap({trade,plays,onClose,onSave,onDelete}){
  return html`<${TradeModal} initial=${trade||null} playbook=${plays||[]} onClose=${onClose} onSave=${onSave} onDelete=${onDelete}/>`;
}

// ÔöÇÔöÇÔöÇ APP ROOT ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
// ÔöÇÔöÇÔöÇ CAPITAL MODAL ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ
function CapitalModal({capital,onSave,onClose}){
  const [tab,setTab]=React.useState('deposit');
  const [amount,setAmount]=React.useState('');
  const [note,setNote]=React.useState('');
  const [date,setDate]=React.useState(new Date().toISOString().slice(0,10));
  const [editInitial,setEditInitial]=React.useState(false);
  const [newInitial,setNewInitial]=React.useState(String(capital.initial));

  function addEvent(){
    const a=parseFloat(amount.replace(',','.'));
    if(!a||a<=0){alert('Ung├╝ltiger Betrag');return;}
    const ev={id:String(Date.now()),date,amount:a,type:tab,note};
    onSave({...capital,events:[...capital.events,ev]});
    setAmount('');setNote('');
  }
  function saveInitial(){
    const v=parseFloat(newInitial.replace(',','.'));
    if(!v||v<0){alert('Ung├╝ltiger Betrag');return;}
    onSave({...capital,initial:v});
    setEditInitial(false);
  }
  function deleteEvent(id){
    if(!confirm('Eintrag l├Âschen?'))return;
    onSave({...capital,events:capital.events.filter(e=>e.id!==id)});
  }

  const inp={background:'var(--inp-bg)',border:'1px solid var(--inp-border)',borderRadius:9,padding:'8px 12px',color:C.text,fontSize:13,width:'100%'};
  return html`<div style=${{position:'fixed',inset:0,zIndex:200,background:'rgba(0,0,0,.8)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick=${onClose}>
    <div onClick=${e=>e.stopPropagation()} style=${{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,width:'100%',maxWidth:480,maxHeight:'90vh',overflowY:'auto'}}>
      <div style=${{padding:'16px 20px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style=${{fontWeight:700,fontSize:15}}>­čĺ░ Kapital verwalten</span>
        <button onClick=${onClose} style=${{background:'none',border:'none',color:C.muted,fontSize:20,cursor:'pointer',lineHeight:1}}>├Ś</button>
      </div>
      <div style=${{padding:20,display:'flex',flexDirection:'column',gap:18}}>

        <!-- Startkapital -->
        <div style=${{background:C.card2,borderRadius:10,padding:'14px 16px'}}>
          <div style=${{fontSize:10,fontWeight:700,color:C.muted,letterSpacing:'.07em',marginBottom:8}}>STARTKAPITAL</div>
          ${editInitial?html`<div style=${{display:'flex',gap:8}}>
            <input type="number" step="0.01" value=${newInitial} onInput=${e=>setNewInitial(e.target.value)} style=${{...inp,flex:1}}/>
            <button onClick=${saveInitial} style=${{background:C.accent,color:'#000',border:'none',borderRadius:8,padding:'8px 16px',fontWeight:700,cursor:'pointer'}}>OK</button>
            <button onClick=${()=>setEditInitial(false)} style=${{background:'transparent',border:`1px solid ${C.border}`,borderRadius:8,padding:'8px 14px',color:C.muted,cursor:'pointer'}}>ÔťĽ</button>
          </div>`:html`<div style=${{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span style=${{fontSize:20,fontWeight:800}}>${capital.initial.toFixed(2)} EUR</span>
            <button onClick=${()=>setEditInitial(true)} style=${{background:'transparent',border:`1px solid ${C.border}`,borderRadius:7,padding:'5px 12px',color:C.muted,cursor:'pointer',fontSize:12}}>ÔťÄ Anpassen</button>
          </div>`}
        </div>

        <!-- Neue Transaktion -->
        <div>
          <div style=${{fontSize:10,fontWeight:700,color:C.muted,letterSpacing:'.07em',marginBottom:10}}>NEUE TRANSAKTION</div>
          <div style=${{display:'flex',gap:6,marginBottom:12}}>
            ${[['deposit','Einzahlung',C.green],['withdrawal','Auszahlung',C.red]].map(([k,l,col])=>html`
              <button key=${k} onClick=${()=>setTab(k)} style=${{flex:1,padding:'8px',borderRadius:9,fontWeight:700,fontSize:13,border:tab===k?'none':`1px solid ${C.border}`,background:tab===k?col+'33':'transparent',color:tab===k?col:C.muted,cursor:'pointer'}}>${l}</button>`)}
          </div>
          <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
            <div><label style=${{fontSize:10,fontWeight:700,color:C.muted,display:'block',marginBottom:4}}>BETRAG (EUR)</label>
              <input type="number" step="0.01" placeholder="0.00" value=${amount} onInput=${e=>setAmount(e.target.value)} style=${inp}/>
            </div>
            <div><label style=${{fontSize:10,fontWeight:700,color:C.muted,display:'block',marginBottom:4}}>DATUM</label>
              <input type="date" value=${date} onChange=${e=>setDate(e.target.value)} style=${inp}/>
            </div>
          </div>
          <div style=${{marginBottom:10}}><label style=${{fontSize:10,fontWeight:700,color:C.muted,display:'block',marginBottom:4}}>NOTIZ (optional)</label>
            <input placeholder="z.B. Monats├╝berweisung" value=${note} onInput=${e=>setNote(e.target.value)} style=${inp}/>
          </div>
          <button onClick=${addEvent} style=${{width:'100%',background:tab==='deposit'?C.green:C.red,color:'#000',border:'none',borderRadius:9,padding:'10px',fontWeight:700,cursor:'pointer',fontSize:14}}>
            ${tab==='deposit'?'+ Einzahlung erfassen':'Ôłĺ Auszahlung erfassen'}
          </button>
        </div>

        <!-- Historie -->
        ${capital.events.length?html`<div>
          <div style=${{fontSize:10,fontWeight:700,color:C.muted,letterSpacing:'.07em',marginBottom:8}}>VERLAUF</div>
          <div style=${{display:'flex',flexDirection:'column',gap:6}}>
            ${[...capital.events].sort((a,b)=>b.date.localeCompare(a.date)).map(e=>html`
              <div key=${e.id} style=${{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:C.card2,borderRadius:8}}>
                <span style=${{fontSize:18}}>${e.type==='deposit'?'ÔČć':'ÔČç'}</span>
                <div style=${{flex:1}}>
                  <div style=${{fontWeight:700,color:e.type==='deposit'?C.green:C.red,fontSize:14}}>${e.type==='deposit'?'+':'Ôłĺ'}${e.amount.toFixed(2)} EUR</div>
                  <div style=${{fontSize:11,color:C.muted}}>${e.date}${e.note?' ┬Ě '+e.note:''}</div>
                </div>
                <button onClick=${()=>deleteEvent(e.id)} style=${{background:'transparent',border:'none',color:C.muted,cursor:'pointer',fontSize:16,padding:4}}>├Ś</button>
              </div>`)}
          </div>
        </div>`:''}
      </div>
    </div>
  </div>`;
}

function App(){
  const [trades,setTrades]=React.useState(()=>{
    try{const s=localStorage.getItem('tt_trades');return s?JSON.parse(s):SD;}catch{return SD;}
  });
  const [plays,setPlays]=React.useState(()=>{
    try{const s=localStorage.getItem('tt_plays');const p=s?JSON.parse(s):SPB;return Array.isArray(p)&&p.length>0&&Array.isArray(p[0])?SPB:p;}catch{return SPB;}
  });
  const [notes,setNotes]=React.useState(()=>{
    try{const s=localStorage.getItem('tt_notes');return s?JSON.parse(s):[];}catch{return [];}
  });
  const [capital,setCapital]=React.useState(()=>{
    try{const s=localStorage.getItem('tt_capital');return s?JSON.parse(s):{initial:1000.21,events:[]};}catch{return{initial:1000.21,events:[]};}
  });
  const [theme,setTheme]=React.useState(()=>{try{return localStorage.getItem('tt_theme')||'dark';}catch{return'dark';}});
  const [page,setPage]=React.useState('dashboard');
  const [modal,setModal]=React.useState(null);
  const [capModal,setCapModal]=React.useState(false);
  function toggleTheme(){
    const next=theme==='dark'?'light':'dark';
    applyTheme(next);setTheme(next);
  }

  React.useEffect(()=>{try{localStorage.setItem('tt_trades',JSON.stringify(trades));}catch{}},[trades]);
  React.useEffect(()=>{try{localStorage.setItem('tt_plays',JSON.stringify(plays));}catch{}},[plays]);
  React.useEffect(()=>{try{localStorage.setItem('tt_notes',JSON.stringify(notes));}catch{}},[notes]);
  React.useEffect(()=>{try{localStorage.setItem('tt_capital',JSON.stringify(capital));}catch{}},[capital]);

  function saveTrade(t){
    setTrades(ts=>{
      const exists=ts.find(x=>x.id===t.id);
      return exists?ts.map(x=>x.id===t.id?t:x):[...ts,{...t,id:Date.now()}];
    });
    setModal(null);
  }
  function delTrade(id){
    setTrades(ts=>ts.filter(t=>t.id!==id));setModal(null);
  }

  const pages={
    dashboard:html`<${Dashboard} trades=${trades} onEdit=${t=>setModal(t||'new')} capital=${capital} onCapital=${()=>setCapModal(true)}/>`,
    journal:html`<${Journal} trades=${trades} setTrades=${setTrades} onEdit=${t=>setModal(t||'new')}/>`,
    reports:html`<${Reports} trades=${trades} plays=${plays}/>`,
    playbook:html`<${Playbook} plays=${plays} setPlays=${setPlays}/>`,
    notebook:html`<${Notebook} notes=${notes} setNotes=${setNotes}/>`,
    import:html`<${ImportView} trades=${trades} setTrades=${setTrades}/>`,
  };

  return html`<div key=${theme} style=${{display:'flex',minHeight:'100vh',background:C.bg,color:C.text,fontFamily:'-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif'}}>
    <div style=${{position:'sticky',top:0,height:'100vh',flexShrink:0}}>
      <${Sidebar} page=${page} setPage=${setPage} trades=${trades} theme=${theme} toggleTheme=${toggleTheme}/>
    </div>
    <main style=${{flex:1,padding:'28px 32px',minWidth:0,overflowX:'hidden'}}>
      ${pages[page]||pages.dashboard}
    </main>
    ${capModal?html`<${CapitalModal} capital=${capital} onSave=${c=>{setCapital(c);}} onClose=${()=>setCapModal(false)}/>`:''}
    ${modal?html`<${ModalWrap}
      key=${modal==='new'?'new':(modal.id||'edit')}
      trade=${modal==='new'?null:modal}
      plays=${plays}
      onClose=${()=>setModal(null)}
      onSave=${saveTrade}
      onDelete=${delTrade}
    />`:''}
  </div>`;
}

ReactDOM.createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>
</body>
</html>
